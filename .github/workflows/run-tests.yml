name: Selenium Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome, firefox]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Setup Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1

      - name: Install Firefox
        if: matrix.browser == 'firefox'
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox

      - name: Show browser versions
        run: |
          google-chrome --version || true
          firefox --version || true

      - name: Validate required secrets
        env:
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
        run: |
          if [ -z "$LOGIN_EMAIL" ]; then
            echo "Missing required secret: LOGIN_EMAIL"
            exit 1
          fi
          if [ -z "$LOGIN_PASSWORD" ]; then
            echo "Missing required secret: LOGIN_PASSWORD"
            exit 1
          fi

      - name: Resolve Chrome binary
        run: |
          CHROME_PATH=$(which google-chrome || which chrome || true)
          echo "CHROME_BIN=$CHROME_PATH" >> $GITHUB_ENV

      - name: Run tests
        env:
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
          LOGIN_DEPARTMENT: College
        run: |
          mvn clean test \
            -Dbrowser=${{ matrix.browser }} \
            -Dheadless=true \
            -Dcucumber.filter.tags="@smoke"
        continue-on-error: true

      - name: Prepare test results
        if: always()
        run: |
          mkdir -p test-results/latest
          
          # Copier les rapports Cucumber JSON
          cp test-output/cucumber-reports/*.json test-results/latest/ || true
          
          # Copier les screenshots
          cp -r target/screenshots test-results/latest/ || true
          
          # Renommer selon le navigateur
          cd test-results/latest
          for file in cucumber*.json; do
            if [ -f "$file" ]; then
              mv "$file" "cucumber-${{ matrix.browser }}.json"
            fi
          done

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}-${{ github.run_number }}
          path: test-results/
          retention-days: 30
