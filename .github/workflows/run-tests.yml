name: Selenium Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome, firefox]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome
        if: matrix.browser == 'chrome'
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Firefox
        if: matrix.browser == 'firefox'
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox

      - name: Set environment variables
        run: |
          echo "LOGIN_EMAIL=${{ secrets.LOGIN_EMAIL }}" >> $GITHUB_ENV
          echo "LOGIN_PASSWORD=${{ secrets.LOGIN_PASSWORD }}" >> $GITHUB_ENV
          echo "LOGIN_DEPARTMENT=Collège" >> $GITHUB_ENV

      - name: Run tests
        run: |
          mvn clean test \
            -Dbrowser=${{ matrix.browser }} \
            -Dheadless=true \
            -Dcucumber.filter.tags="@smoke"
        continue-on-error: true

      - name: Prepare test results
        if: always()
        run: |
          mkdir -p test-results/latest
          
          # Copier les rapports Cucumber JSON
          cp test-output/cucumber-reports/*.json test-results/latest/ || true
          
          # Copier les screenshots
          cp -r target/screenshots test-results/latest/ || true
          
          # Renommer selon le navigateur
          cd test-results/latest
          for file in cucumber*.json; do
            if [ -f "$file" ]; then
              mv "$file" "cucumber-${{ matrix.browser }}.json"
            fi
          done

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}-${{ github.run_number }}
          path: test-results/
          retention-days: 30