name: Publish Dashboard

on:
  workflow_run:
    workflows: ["Selenium Tests"]
    types: [completed]

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download artifacts from workflow run
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: run-tests.yml
          run_id: ${{ github.event.workflow_run.id }}
          path: test-results-artifacts/
        continue-on-error: true

      - name: Merge results
        run: |
          mkdir -p test-results/latest

          if [ -d "test-results-artifacts" ]; then
            find test-results-artifacts -name "*.json" -exec cp {} test-results/latest/ \; 2>/dev/null || true
            echo "JSON files merged"
          else
            echo "No artifacts found; generating empty dashboard"
          fi

          echo "Content of test-results/latest:"
          ls -la test-results/latest/ || echo "Empty folder"

      - name: Restore previous dashboard history
        run: |
          mkdir -p dashboard
          git fetch origin gh-pages --depth=1 || true
          git show origin/gh-pages:runs-history.json > dashboard/runs-history.json 2>/dev/null || echo "[]"
          git show origin/gh-pages:test-runs-history.json > dashboard/test-runs-history.json 2>/dev/null || echo "[]"

      - name: Generate Dashboard
        run: |
          node scripts/generate-dashboard.js \
            --browser all \
            --branch "${{ github.event.workflow_run.head_branch }}" \
            --run-id "${{ github.event.workflow_run.id }}" \
            --run-number "${{ github.event.workflow_run.run_number }}" \
            --repo "${{ github.repository }}" \
            --json-path "test-results/latest"

      - name: List generated files
        run: |
          echo "Content of dashboard:"
          ls -la dashboard/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          publish_branch: gh-pages
